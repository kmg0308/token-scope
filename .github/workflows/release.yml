name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Build and verify app, ZIP, and PKG
        run: |
          VERSION="0.1.${GITHUB_RUN_NUMBER}"
          BUILD_COMMIT="${GITHUB_SHA:0:7}"
          VERSION="$VERSION" BUILD_NUMBER="$GITHUB_RUN_NUMBER" BUILD_COMMIT="$BUILD_COMMIT" ./scripts/verify.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="0.1.${GITHUB_RUN_NUMBER}"
          TAG="v${VERSION}"
          gh release create "$TAG" \
            "dist/TokenMeter.zip" \
            "dist/TokenMeter.pkg" \
            "dist/TokenMeter-${VERSION}.zip" \
            "dist/TokenMeter-${VERSION}.pkg" \
            --target "$GITHUB_SHA" \
            --title "TokenMeter ${VERSION}" \
            --notes "Automated build from main commit ${GITHUB_SHA}." \
            --latest
